name: Daily Report Generator

on:
  # 每3小时运行一次（北京时间 6:00, 9:00, 12:00, 15:00, 18:00, 21:00）
  schedule:
    - cron: '0 22,1,4,7,10,13 * * *'
  workflow_dispatch:
    # 支持手动触发
    inputs:
      reason:
        description: '触发原因'
        required: false
        default: '手动触发'

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  generate-report:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        cache: 'pip'

    - name: Install dependencies
      run: |
        pip install -r requirements.txt

    - name: Generate daily report
      env:
        QWEATHER_API_KEY: ${{ secrets.QWEATHER_API_KEY }}
        QWEATHER_BASE_URL: ${{ secrets.QWEATHER_BASE_URL }}
        NEWSAPI_KEY: ${{ secrets.NEWSAPI_KEY }}
        ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        ANTHROPIC_BASE_URL: ${{ secrets.ANTHROPIC_BASE_URL }}
      run: |
        python main.py

    - name: Setup Pages
      uses: actions/configure-pages@v4

    - name: Upload artifact
      uses: actions/upload-pages-artifact@v3
      with:
        path: './docs'

    - name: Deploy to GitHub Pages
      id: deployment
      uses: actions/deploy-pages@v4

    - name: Commit archive
      run: |
        git config --local user.email "action@github.com"
        git config --local user.name "GitHub Action"
        git add docs/archive/
        git diff --quiet && git diff --staged --quiet || git commit -m "Update daily report archive $(date +%Y%m%d)"
        git push
